services:
  # ─── Database ────────────────────────────────────────────
  health-db:
    image: postgres:16-alpine
    container_name: health-db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - health-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────
  health-backend:
    build:
      context: ./002-backend
      dockerfile: Dockerfile
    container_name: health-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      health-db:
        condition: service_healthy
    networks:
      - health-net
    # Port TIDAK di-expose ke luar — hanya via Nginx

  # ─── Frontend + Nginx ────────────────────────────────────
  health-frontend:
    build:
      context: ./001-frontend
      dockerfile: Dockerfile
    container_name: health-frontend
    restart: unless-stopped
    ports:
      - "80:80"        # HTTP
    depends_on:
      - health-backend
    networks:
      - health-net

# ─── Volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ──────────────────────────────────────────────
networks:
  health-net:
    driver: bridge
